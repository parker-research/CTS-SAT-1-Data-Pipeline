services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cts1
      POSTGRES_PASSWORD: cts1
      POSTGRES_DB: cts1
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cts1"]
      interval: 5s
      timeout: 5s
      retries: 10

  dagster-webserver:
    build: .
    command: dagster-webserver -h 0.0.0.0 -p 3000 -w workspace.yaml
    ports:
      - "3000:3000"
    environment:
      DAGSTER_HOME: /dagster_home
      DATABASE_URL: postgresql+psycopg2://cts1:cts1@postgres:5432/cts1
      SATNOGS_NETWORK_API_KEY: ${SATNOGS_NETWORK_API_KEY}
      # SATNOGS_DB_API_KEY: ${SATNOGS_DB_API_KEY}   # uncomment when needed
      SATELLITE_NORAD: "69015"
      MAX_PARALLEL_DEMOD: "4"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - dagster_home:/dagster_home
      - data_store:/data

  dagster-daemon:
    build: .
    command: dagster-daemon run -w workspace.yaml
    environment:
      DAGSTER_HOME: /dagster_home
      DATABASE_URL: postgresql+psycopg2://cts1:cts1@postgres:5432/cts1
      SATNOGS_NETWORK_API_KEY: ${SATNOGS_NETWORK_API_KEY}
      SATELLITE_NORAD: "69015"
      MAX_PARALLEL_DEMOD: "4"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - dagster_home:/dagster_home
      - data_store:/data

volumes:
  postgres_data:
  dagster_home:
  data_store:
